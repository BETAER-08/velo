name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            artifact_name: macos-arm64
          - platform: macos-latest
            target: x86_64-apple-darwin
            artifact_name: macos-x64
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact_name: linux-x64
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: windows-x64

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf libgtk-3-dev rpm

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: '. -> target'

      - name: Install root npm dependencies
        run: npm install

      - name: Install frontend dependencies
        run: cd ui && pnpm install --no-frozen-lockfile

      - name: Build frontend
        run: cd ui && pnpm build

      - name: Build Tauri app
        run: npm run tauri -- build --target ${{ matrix.target }}

      - name: Upload macOS artifacts
        if: matrix.platform == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            target/${{ matrix.target }}/release/bundle/macos/*.app.tar.gz

      - name: Upload Linux DEB artifacts
        if: matrix.platform == 'ubuntu-22.04'
        uses: actions/upload-artifact@v4
        with:
          name: linux-x64-deb
          path: |
            target/${{ matrix.target }}/release/bundle/deb/*.deb
            target/${{ matrix.target }}/release/bundle/appimage/*.AppImage

      - name: Upload Linux RPM artifacts
        if: matrix.platform == 'ubuntu-22.04'
        uses: actions/upload-artifact@v4
        with:
          name: linux-x64-rpm
          path: |
            target/${{ matrix.target }}/release/bundle/rpm/*.rpm

      - name: Upload Windows artifacts
        if: matrix.platform == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            target/${{ matrix.target }}/release/bundle/msi/*.msi
            target/${{ matrix.target }}/release/bundle/nsis/*.exe

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -lah artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Velo ${{ github.ref_name }}
          body: "Downloads: macOS Apple Silicon (aarch64.dmg), macOS Intel (x64.dmg), Windows (x64-setup.exe / x64.msi), Linux Ubuntu/Debian (.deb), Linux Fedora/RHEL/openSUSE/CentOS/Rocky (.rpm), Linux all distros Arch/Manjaro/NixOS (.AppImage)"
          draft: true
          prerelease: true
          files: artifacts/*
